name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAX_ENABLE_X64: "1"
  JAX_LOGGING_LEVEL: "ERROR"
  JAX_PLATFORMS: "cpu"

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0
      - name: Check formatting
        run: pixi run --frozen format --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0
      - name: Lint code
        run: pixi run --frozen lint

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0
      - name: Run basedpyright
        run: pixi run --frozen type-check

  test:
    name: Test (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: test-py312
          - env: test-py313
          - env: test-py314
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0
        with:
          environments: ${{ matrix.env }}

      - name: Run tests with coverage
        run: pixi run --frozen -e ${{ matrix.env }} test-cov

      - name: Upload coverage artifact
        if: matrix.env == 'test-py314'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload to Codecov
        if: matrix.env == 'test-py314'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-lowest:
    name: Test (lowest deps, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0

      - name: Run tests
        run: pixi run --frozen test-lowest
