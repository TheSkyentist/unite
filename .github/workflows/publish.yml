# Publish to PyPI when a GitHub Release is created.
#
# Prerequisites – configure trusted publishing on PyPI:
#   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#
#   Publisher:  GitHub Actions
#   Owner:     rhviding
#   Repo:      unite
#   Workflow:  publish.yml
#   Environment: pypi

name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags: ['v*']

  # Allow manual trigger for testing the workflow
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build sdist & wheel ──────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ── Publish to PyPI ──────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/unite

    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── Publish to TestPyPI (optional, runs on workflow_dispatch) ────────
  publish-test:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/unite

    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
