name: Bench

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  JAX_ENABLE_X64: "1"
  JAX_LOGGING_LEVEL: "ERROR"
  JAX_PLATFORMS: "cpu"

jobs:
  codspeed:
    name: CodSpeed benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0
        with:
          environments: bench-ci
          # Allow lock refresh — bench-ci is not in the main solve group.
          frozen: false

      - name: Run benchmarks under CodSpeed
        uses: CodSpeedHQ/action@v3
        with:
          # CODSPEED_TOKEN is auto-provided for OSS repos onboarded at codspeed.io.
          # token: ${{ secrets.CODSPEED_TOKEN }}
          # Deselect `slow` benchmarks in CI — they're for local deep dives.
          run: pixi run -e bench-ci pytest benchmarks/ --codspeed -m "not slow"
